name: Cache demo and context
on: workflow_dispatch
jobs:
  print:
    runs-on: ubuntu-latest
    steps:
      - name: Print context
        run: echo "${{ toJSON(github) }}"
      - name: Print context event
        run: echo "${{ toJSON(github.event) }}"
